<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
<style>
    .main{
        height: 270px;
        width: 100px;
        border: 5px solid rgb(208, 199, 199);

    }
    .red{
        height: 50px;
        width: 50px;
        border-radius: 50%;
        border:2px solid rgb(208, 199, 199);
        background-color: red;
        margin: 26px;
    }
    .yellow{
        height: 50px;
        width: 50px;
         border:2px solid rgb(208, 199, 199);
        border-radius: 50%;
        background-color: yellow;
        margin: 26px;

    }
    .green{
        height: 50px;
        width: 50px;
         border:2px solid rgb(208, 199, 199);
        border-radius: 50%;
        background-color: green;
        margin: 26px;
    }

</style>
</head>
<body>
    <div class="main">
        <div class="red"></div>
        <div class="yellow"></div>
        <div class="green"></div>
    </div>
    
</body>
</html>
